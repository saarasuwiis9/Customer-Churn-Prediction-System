<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            margin-top: 0;
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background-color: #0f172a;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        button {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 0.5rem;
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 1rem;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
            display: none;
            text-align: center;
            font-weight: 600;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result.high-risk {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .result.low-risk {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .loader {
            display: none;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Predict Customer Churn</h1>
        
        <form id="churnForm">
            <div class="form-group">
                <label for="tenure">Tenure (Months)</label>
                <input type="number" id="tenure" name="tenure" min="0" required placeholder="e.g. 24">
            </div>

            <div class="form-group">
                <label for="MonthlyCharges">Monthly Charges ($)</label>
                <input type="number" id="MonthlyCharges" name="MonthlyCharges" min="0" step="0.01" required placeholder="e.g. 59.99">
            </div>

            <div class="form-group">
                <label for="TotalCharges">Total Charges ($)</label>
                <input type="number" id="TotalCharges" name="TotalCharges" min="0" step="0.01" required placeholder="e.g. 1439.76">
            </div>

            <div class="form-group">
                <label for="Contract">Contract</label>
                <select id="Contract" name="Contract">
                    <option value="Month-to-month">Month-to-month</option>
                    <option value="One year">One year</option>
                    <option value="Two year">Two year</option>
                </select>
            </div>

            <div class="form-group">
                <label for="InternetService">Internet Service</label>
                <select id="InternetService" name="InternetService">
                    <option value="Fiber optic">Fiber optic</option>
                    <option value="DSL">DSL</option>
                    <option value="No">No Internet</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">
                <span id="btnText">Analyze Risk</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <div id="resultBox" class="result">
            <div id="resultText"></div>
            <div id="confidenceText" style="font-size: 0.85rem; margin-top: 0.25rem; opacity: 0.8;"></div>
        </div>
    </div>

    <script>
        document.getElementById('churnForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');
            const confidenceText = document.getElementById('confidenceText');
            
            // Loading State
            btnText.style.display = 'none';
            loader.style.display = 'block';
            resultBox.style.display = 'none';
            resultBox.className = 'result';
            
            const formData = {
                tenure: parseInt(document.getElementById('tenure').value),
                MonthlyCharges: parseFloat(document.getElementById('MonthlyCharges').value),
                TotalCharges: parseFloat(document.getElementById('TotalCharges').value),
                Contract: document.getElementById('Contract').value,
                InternetService: document.getElementById('InternetService').value
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to predict');
                }

                const data = await response.json();
                
                resultBox.style.display = 'block';
                if(data.prediction === 1) {
                    resultBox.classList.add('high-risk');
                    resultText.innerHTML = '🚨 High Risk of Churn';
                } else {
                    resultBox.classList.add('low-risk');
                    resultText.innerHTML = '✅ Low Risk of Churn';
                }
                
                confidenceText.innerText = `Confidence: ${data.confidence}`;
                
            } catch (error) {
                resultBox.style.display = 'block';
                resultBox.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                resultBox.style.color = 'var(--danger)';
                resultText.innerText = `Error: ${error.message}`;
                confidenceText.innerText = 'Make sure the API server is running on port 8000!';
            } finally {
                btnText.style.display = 'inline';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
